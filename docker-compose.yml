version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: habilidadesia-app:latest
    container_name: habilidadesia-container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
